document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <div style=\"max-width:1200px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px\">\n      <a href=\"#top\" style=\"display:flex;align-items:center;gap:3px;text-decoration:none;color:#121417;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:23px;letter-spacing:-0.02em\">Vendora<span style=\"color:#EC5B34\">.<\u002Fspan><\u002Fa>\n      <nav style=\"display:flex;gap:32px;align-items:center\">\n        <a href=\"#comment\" style=\"text-decoration:none;color:#3a3d42;font-weight:500;font-size:15px\">Comment ça marche<\u002Fa>\n        <a href=\"#categories\" style=\"text-decoration:none;color:#3a3d42;font-weight:500;font-size:15px\">Catégories<\u002Fa>\n        <a href=\"#securite\" style=\"text-decoration:none;color:#3a3d42;font-weight:500;font-size:15px\">Sécurité<\u002Fa>\n        <a href=\"#vendeurs\" style=\"text-decoration:none;color:#3a3d42;font-weight:500;font-size:15px\">Vendeurs<\u002Fa>\n      <\u002Fnav>\n      <div style=\"display:flex;gap:16px;align-items:center\">\n        <a onclick=\"{{ enterBuyer }}\" style=\"cursor:pointer;text-decoration:none;color:#121417;font-weight:600;font-size:15px\">Se connecter<\u002Fa>\n        <a onclick=\"{{ enterDemande }}\" style=\"cursor:pointer;text-decoration:none;background:#EC5B34;color:#fff;font-weight:600;font-size:15px;padding:11px 20px;border-radius:10px;box-shadow:0 6px 18px rgba(236,91,52,0.28)\" style-hover=\"background:#d94e29\">Publier une demande<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section id=\"top\" data-screen-label=\"Accueil\" style=\"scroll-margin-top:80px\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:80px 32px 72px;display:grid;grid-template-columns:1.05fr 0.95fr;gap:64px;align-items:center\">\n      <div>\n        <div style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(236,91,52,0.1);color:#c2461f;font-weight:600;font-size:13px;letter-spacing:0.04em;text-transform:uppercase;padding:7px 14px;border-radius:999px;margin-bottom:24px\">Marketplace inversée<\u002Fdiv>\n        <h1 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(38px,4.6vw,60px);line-height:1.02;letter-spacing:-0.03em;margin:0 0 22px\">La marketplace où les vendeurs se <span style=\"color:#EC5B34\">battent pour vous<\u002Fspan>.<\u002Fh1>\n        <p style=\"font-size:19px;line-height:1.55;color:#494d53;margin:0 0 34px;max-width:520px\">Ne cherchez plus, ne comparez plus des dizaines d'annonces. Publiez votre besoin — produit ou service — et laissez les vendeurs venir à vous avec leurs meilleures offres.<\u002Fp>\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;margin-bottom:32px\">\n          <a onclick=\"{{ enterDemande }}\" style=\"cursor:pointer;text-decoration:none;background:#EC5B34;color:#fff;font-weight:600;font-size:16px;padding:15px 26px;border-radius:12px;box-shadow:0 10px 26px rgba(236,91,52,0.3)\" style-hover=\"background:#d94e29\">Publier une demande<\u002Fa>\n          <a onclick=\"{{ enterVendeur }}\" style=\"cursor:pointer;text-decoration:none;background:transparent;color:#121417;font-weight:600;font-size:16px;padding:15px 26px;border-radius:12px;border:1.5px solid rgba(18,20,23,0.18)\" style-hover=\"border-color:#121417\">Devenir vendeur<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:26px;flex-wrap:wrap\">\n          <div style=\"display:flex;align-items:center;gap:9px;color:#3a3d42;font-weight:500;font-size:15px\"><span style=\"width:20px;height:20px;border-radius:50%;background:#2E9E6B;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">✓<\u002Fspan>Paiement sous séquestre<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:9px;color:#3a3d42;font-weight:500;font-size:15px\"><span style=\"width:20px;height:20px;border-radius:50%;background:#2E9E6B;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">✓<\u002Fspan>Vendeurs vérifiés<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:9px;color:#3a3d42;font-weight:500;font-size:15px\"><span style=\"width:20px;height:20px;border-radius:50%;background:#2E9E6B;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700\">✓<\u002Fspan>Publication gratuite<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid rgba(18,20,23,0.08);border-radius:22px;padding:22px;box-shadow:0 30px 70px -30px rgba(15,27,45,0.35)\">\n        <div style=\"background:#0F1B2D;border-radius:16px;padding:18px 20px;color:#fff;margin-bottom:16px\">\n          <div style=\"font-size:12px;letter-spacing:0.05em;text-transform:uppercase;color:#8ea0b8;font-weight:600;margin-bottom:8px\">Demande de l'acheteur<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;margin-bottom:6px\">iPhone 14 · 128 Go<\u002Fdiv>\n          <div style=\"font-size:14px;color:#b7c3d4;line-height:1.4\">Très bon état · budget max 450 € · sous 3 jours · Lyon<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n          <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:#494d53\"><span style=\"width:8px;height:8px;border-radius:50%;background:#2E9E6B;display:inline-block;animation:vd-pulse 1.6s ease-in-out infinite\"><\u002Fspan>3 offres reçues en 2 h<\u002Fdiv>\n          <div style=\"font-size:13px;color:#8b8f96;font-weight:500\">Trié par prix<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ heroOffers }}\" as=\"o\" hint-placeholder-count=\"3\">\n            <div style=\"border:1.5px solid {{ o.borderColor }};background:{{ o.bg }};border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:relative\">\n              <div style=\"min-width:0\">\n                <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:3px\">\n                  <span style=\"font-weight:600;font-size:15px;color:#121417\">{{ o.seller }}<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:600;color:#2E9E6B;background:rgba(46,158,107,0.12);padding:2px 7px;border-radius:6px\">✓ vérifié<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:13px;color:#6b6f76\">{{ o.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right;flex-shrink:0\">\n                <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;color:#121417;letter-spacing:-0.02em\">{{ o.price }}<\u002Fdiv>\n                <sc-if value=\"{{ o.isBest }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-size:11px;font-weight:700;color:#EC5B34;text-transform:uppercase;letter-spacing:0.04em\">Meilleur prix<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"background:#0F1B2D;color:#fff\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:34px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:24px\">\n      <div><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:#EC5B34;letter-spacing:-0.02em\">&lt; 24 h<\u002Fdiv><div style=\"font-size:14px;color:#a9b6c8;margin-top:4px\">pour recevoir vos premières offres<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:#EC5B34;letter-spacing:-0.02em\">100 %<\u002Fdiv><div style=\"font-size:14px;color:#a9b6c8;margin-top:4px\">des paiements sécurisés en séquestre<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:#EC5B34;letter-spacing:-0.02em\">40+<\u002Fdiv><div style=\"font-size:14px;color:#a9b6c8;margin-top:4px\">produits et services demandables<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;color:#EC5B34;letter-spacing:-0.02em\">0 €<\u002Fdiv><div style=\"font-size:14px;color:#a9b6c8;margin-top:4px\">pour publier une demande, sans engagement<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"comment\" style=\"scroll-margin-top:80px\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:96px 32px\">\n      <div style=\"max-width:640px;margin-bottom:56px\">\n        <div style=\"color:#c2461f;font-weight:600;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px\">Comment ça marche<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(30px,3.5vw,44px);line-height:1.08;letter-spacing:-0.02em;margin:0\">Quatre étapes, et le marché vient à vous<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:28px\">\n        <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;color:#EC5B34;margin-bottom:16px\">{{ s.n }}<\u002Fdiv>\n            <div style=\"height:1px;background:rgba(18,20,23,0.12);margin-bottom:18px\"><\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;letter-spacing:-0.01em;margin:0 0 10px\">{{ s.t }}<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.55;color:#5b5f66;margin:0\">{{ s.d }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"background:#fff\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:88px 32px;display:grid;grid-template-columns:0.9fr 1.1fr;gap:64px;align-items:center\">\n      <div>\n        <div style=\"color:#c2461f;font-weight:600;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px\">Le modèle inversé<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(30px,3.5vw,44px);line-height:1.08;letter-spacing:-0.02em;margin:0 0 20px\">On inverse la règle : le besoin attire l'offre<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.6;color:#5b5f66;margin:0\">Sur une marketplace classique, c'est à vous de fouiller. Ici, vous posez le besoin une fois — et ce sont les vendeurs qui se mettent en concurrence pour le remporter.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"border:1px solid rgba(18,20,23,0.1);border-radius:18px;overflow:hidden\">\n        <div style=\"display:grid;grid-template-columns:1.1fr 1fr 1.1fr;background:#0F1B2D;color:#fff\">\n          <div style=\"padding:16px 20px;font-size:13px;font-weight:600;color:#8ea0b8\">&nbsp;<\u002Fdiv>\n          <div style=\"padding:16px 20px;font-size:13px;font-weight:600;color:#a9b6c8;text-align:center\">Marketplace classique<\u002Fdiv>\n          <div style=\"padding:16px 20px;font-size:13px;font-weight:700;text-align:center;background:rgba(236,91,52,0.16);color:#ffb59c\">Vendora<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-for list=\"{{ compareRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n          <div style=\"display:grid;grid-template-columns:1.1fr 1fr 1.1fr;border-top:1px solid rgba(18,20,23,0.08)\">\n            <div style=\"padding:16px 20px;font-size:14px;font-weight:600;color:#121417\">{{ r.label }}<\u002Fdiv>\n            <div style=\"padding:16px 20px;font-size:14px;color:#8b8f96;text-align:center\">{{ r.classic }}<\u002Fdiv>\n            <div style=\"padding:16px 20px;font-size:14px;color:#121417;font-weight:500;text-align:center;background:rgba(236,91,52,0.05)\">{{ r.vendora }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"categories\" data-screen-label=\"Catégories\" style=\"scroll-margin-top:80px\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:96px 32px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:32px;flex-wrap:wrap;margin-bottom:44px\">\n        <div style=\"max-width:600px\">\n          <div style=\"color:#c2461f;font-weight:600;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px\">Catégories<\u002Fdiv>\n          <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(30px,3.5vw,44px);line-height:1.08;letter-spacing:-0.02em;margin:0 0 12px\">Produits et services : un besoin, des offres<\u002Fh2>\n          <p style=\"font-size:16px;line-height:1.55;color:#5b5f66;margin:0\">6 univers produits et une gamme complète de services. Ouvrez la tuile « Services » pour découvrir toutes les prestations disponibles.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px\">\n        <sc-for list=\"{{ products }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <a onclick=\"{{ c.onGo }}\" style=\"cursor:pointer;text-decoration:none;background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:16px;padding:24px;display:block;transition:transform .15s,box-shadow .15s,border-color .15s\" style-hover=\"transform:translateY(-3px);border-color:rgba(236,91,52,0.45);box-shadow:0 18px 40px -22px rgba(15,27,45,0.4)\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:18px\">\n              <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#EC5B34\">{{ c.n }}<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:600;color:#8b8f96;background:rgba(18,20,23,0.05);padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:0.04em\">Produit<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:22px;letter-spacing:-0.01em;margin:0 0 8px;color:#121417\">{{ c.name }}<\u002Fh3>\n            <p style=\"font-size:14px;line-height:1.5;color:#6b6f76;margin:0 0 16px\">{{ c.blurb }}<\u002Fp>\n            <span style=\"font-size:14px;font-weight:600;color:#EC5B34\">Publier une demande →<\u002Fspan>\n          <\u002Fa>\n        <\u002Fsc-for>\n        <div onclick=\"{{ toggleServices }}\" style=\"grid-column:1 / -1;background:#0F1B2D;color:#fff;border-radius:16px;padding:28px 30px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:24px;transition:box-shadow .15s\" style-hover=\"box-shadow:0 20px 50px -24px rgba(15,27,45,0.55)\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\">\n              <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:#ffb59c\">07<\u002Fspan>\n              <span style=\"font-size:11px;font-weight:600;color:#8ea0b8;background:rgba(255,255,255,0.09);padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:0.04em\">Services<\u002Fspan>\n            <\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;letter-spacing:-0.01em;margin:0 0 6px\">Services &amp; prestations<\u002Fh3>\n            <p style=\"font-size:15px;color:#a9b6c8;margin:0;max-width:660px\">Ménage, dépannage &amp; travaux, transport, cours, numérique, quotidien — 6 familles de prestations. Cliquez pour tout découvrir.<\u002Fp>\n          <\u002Fdiv>\n          <span style=\"width:52px;height:52px;flex-shrink:0;border-radius:13px;background:#EC5B34;color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:400;line-height:1\">{{ servicesSign }}<\u002Fspan>\n        <\u002F olumns:repeat(2,1fr);gap:22px\">\n        <sc-for list=\"{{ securityCards }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"border:1px solid rgba(18,20,23,0.1);border-radius:16px;padding:28px;background:#F5F2EC\">\n            <div style=\"width:40px;height:40px;border-radius:10px;background:#0F1B2D;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;margin-bottom:18px\">{{ s.k }}<\u002Fdiv>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;letter-spacing:-0.01em;margin:0 0 8px\">{{ s.t }}<\u002Fh3>\n            <p style=\"font-size:15px;line-height:1.55;color:#5b5f66;margin:0\">{{ s.d }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <sc-if value=\"{{ showApp }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"scroll-margin-top:80px\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:96px 32px\">\n      <div style=\"max-width:640px;margin-bottom:48px\">\n        <div style=\"color:#c2461f;font-weight:600;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px\">Aperçu<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(30px,3.5vw,44px);line-height:1.08;letter-spacing:-0.02em;margin:0\">Deux clics pour publier, une vue claire pour choisir<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:0.85fr 1.15fr;gap:24px;align-items:start\">\n        <div style=\"background:#0F1B2D;border-radius:20px;padding:28px;color:#fff\">\n          <div style=\"font-size:13px;letter-spacing:0.05em;text-transform:uppercase;color:#8ea0b8;font-weight:600;margin-bottom:18px\">Nouvelle demande<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <div><div style=\"font-size:12px;color:#8ea0b8;margin-bottom:6px\">Ca hrink:0;border-radius:7px;background:rgba(236,91,52,0.2);color:#ffb59c;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px\">3<\u002Fspan><div><div style=\"font-weight:600;font-size:16px;margin-bottom:3px\">Commission uniquement à la vente<\u002Fdiv><div style=\"font-size:14px;color:#a9b6c8;line-height:1.5\">Aucun abonnement obligatoire au départ. Une commission n'est prélevée que lorsque vous concluez.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"background:#fff\">\n    <div style=\"max-width:820px;margin:0 auto;padding:92px 32px\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(28px,3.2vw,40px);letter-spacing:-0.02em;margin:0 0 40px;text-align:center\">Questions fréquentes<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:12px\">\n        <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ f.onToggle }}\" style=\"border:1px solid rgba(18,20,23,0.1);border-radius:14px;padding:22px 24px;cursor:pointer;background:#F5F2EC\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;gap:16px\">\n              <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;color:#121417\">{{ f.q }}<\u002Fspan>\n              <span style=\"font-size:24px;color:#EC5B34;font-weight:400;line-height:1;flex-shrink:0\">{{ f.sign }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"font-size:15px;line-height:1.6;color:#5b5f66;margin:14px 0 0\">{{ f.a }}<\u002Fp>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section>\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 32px 96px\">\n      <div style=\"background:#EC5B34;border-radius:24px;padding:64px 48px;text-align:center;color:#fff\">\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(30px,3.6vw,46px);line-height:1.05;letter-spacing:-0.02em;margin:0 0 16px;max-width:640px;margin-left:auto;margin-right:auto\">Publiez votre besoin. Laissez le marché venir à vous.<\u002Fh2>\n        <p style=\"font-size:18px;color:rgba(255,255,255,0.9);margin:0 0 30px\">Gratuit, sans engagement, et vos premières offres en moins de 24 heures.<\u002Fp>\n        <a onclick=\"{{ enterDemande }}\" style=\"cursor:pointer;text-decoration:none;background:#0F1B2D;color:#fff;font-weight:600;font-size:16px;padding:16px 30px;border-radius:12px;display:inline-block\" style-hover=\"background:#1a2b45\">Publier une demande<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"border-top:1px solid rgba(18,20,23,0.1)\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:40px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px\">\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:-0.02em\">Vendora<span style=\"color:#EC5B34\">.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:28px;flex-wrap:wrap\">\n        <a href=\"#comment\" style=\"text-decoration:none;color:#5b5f66;font-size:14px;font-weight:500\">Comment ça marche<\u002Fa>\n        <a href=\"#categories\" style=\"text-decoration:none;color:#5b5f66;font-size:14px;font-weight:500\">Catégories<\u002Fa>\n        <a href=\"#securite\" style=\"text-decoration:none;color:#5b5f66;font-size:14px;font-weight:500\">Sécurité<\u002Fa>\n        <a href=\"#vendeurs\" style=\"text-decoration:none;color:#5b5f66;font-size:14px;font-weight:500\">Vendeurs<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"color:#8b8f96;font-size:13px\">© 2026 Vendora — Marketplace inversée<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ isApp }} ;cursor:pointer\">Déconnexion<\u002Fbutton>\n        <\u002Fsc-if>\n        <button onclick=\"{{ resetDemo }}\" style=\"background:transparent;border:1px solid rgba(18,20,23,0.14);border-radius:9px;padding:8px 14px;font-weight:600;font-size:13px;color:#6b6f76;cursor:pointer\">Réinitialiser<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main style=\"max-width:1080px;margin:0 auto;padding:32px 24px 80px\">\n\n    <sc-if value=\"{{ isBuyerHome }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:28px\">\n          <div>\n            <div style=\"color:#c2461f;font-weight:600;font-size:13px;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:8px\">Espace acheteur<\u002Fdiv>\n            <h1 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:34px;letter-spacing:-0.02em;margin:0\">Vos demandes<\u002Fh1>\n          <\u002Fdiv>\n          <button onclick=\"{{ goNew }}\" style=\"background:#EC5B34;color:#fff;border:none;border-radius:11px;padding:13px 22px;font-weight:600;font-size:15px;cursor:pointer;box-shadow:0 8px 22px rgba(236,91,52,0.28)\">+  Publier une demande<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:16px;padding:20px 22px;margin-bottom:24px\">\n          <div style=\"font-size:13px;font-weight:600;color:#6b6f76;margin-bottom:12px\">Démarrer une demande dans une catégorie<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n            <sc-for list=\"{{ categories }}\" as=\"cat\" hint-placeholder-count=\"12\">\n              <button onclick=\"{{ cat.onPick }}\" style=\"background:rgba(236,91,52,0.07);border:1px solid rgba(236,91,52,0.18);color:#c2461f;border-radius:9px;padding:8px 13px;font-weight:600;font-size:13px;cursor:pointer\">{{ cat.name }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasRequests }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <sc-for list=\"{{ myRequests }}\" as=\"r\" hint-placeholder-count=\"2\">\n              <div onclick=\"{{ r.onOpen }}\" style=\"background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:16px;padding:22px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:20px\" style-hover=\"border-color:rgba(236,91,52,0.4);box-shadow:0 14px 34px -22px rgba(15,27,45,0.4)\">\n                <div style=\"min-width:0\">\n                  <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:7px;flex-wrap:wrap\">\n                    <span style=\"font-size:11px;font-weight:600;color:#6b6f76;background:rgba(18,20,23,0.05);padding:3px 9px;border-radius:6px\">{{ r.category }}<\u002Fspan>\n                    <span style=\"font-size:11px;font-weight:700;color:{{ r.statusColor }};background:{{ r.statusBg }};padding:3px 9px;border-radius:6px;text-transform:uppercase;letter-spacing:0.03em\">{{ r.statusLabel }}<\u002Fspan>\n                    <span style=\"font-size:12px;color:#9a9ea5\">{{ r.age }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;letter-spacing:-0.01em;margin-bottom:3px\">{{ r.title }}<\u002Fdiv>\n                  <div style=\"font-size:14px;color:#6b6f76\">Budget max {{ r.budgetLabel }} · {{ r.delay }} · {{ r.city }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:right;flex-shrink:0\">\n                  <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:24px;color:#EC5B34;letter-spacing:-0.02em\">{{ r.offerCount }}<\u002Fdiv>\n                  <div style=\"font-size:12px;color:#6b6f76;font-weight:600\">offre(s)<\u002Fdiv>\n                  <div style=\"font-size:13px;font-weight:600;color:#EC5B34;margin-top:8px\">Voir →<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ noRequests }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1px dashed rgba(18,20,23,0.2);border-radius:16px;padding:52px 24px;text-align:center\">\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;margin-bottom:8px\">Aucune demande pour l'instant<\u002Fdiv>\n            <p style=\"font-size:15px;color:#6b6f76;margin:0 0 22px;max-width:420px;margin-left:auto;margin-right:auto\">Publiez votre premier besoin — produit ou service — et laissez les vendeurs venir à vous avec leurs meilleures offres.<\u002Fp>\n            <button onclick=\"{{ goNew }}\" style=\"background:#EC5B34;color:#fff;border:none;border-radius:11px;padding:13px 24px;font-weight:600;font-size:15px;cursor:pointer\">Publier une demande<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isNew }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:640px;margin:0 auto\">\n        <button onclick=\"{{ goBuyerHome }}\" style=\"background:none;border:none;color:#6b6f76;font-weight:600;font-size:14px;cursor:pointer;padding:0;margin-bottom:18px\">← Retour<\u002Fbutton>\n        <h1 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:32px;letter-spacing:-0.02em;margin:0 0 6px\">Publier une demande<\u002Fh1>\n        <p style=\"font-size:15px;color:#6b6f76;margin:0 0 28px\">Publication gratuite. Les vendeurs vous répondent, souvent en moins de 24 h.<\u002Fp>\n\n        <div style=\"background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:18px;padding:28px;display:flex;flex-direction:column;gap:18px\">\n          <div>\n            <label style=\"display:block;font-size:13px;font-weight:600;color:#3a3d42;margin-bottom:6px\">Catégorie<\u002Flabel>\n            <select name=\"category\" value=\"{{ draftReq.category }}\" onchange=\"{{ onReqChange }}\" style=\"width:100%;padding:12px 14px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:15px;background:#fff;color:#121417\">\n              <option value=\"\">Choisir une catégorie…<\u002Foption>\n              <sc-for list=\"{{ categoryNames }}\" as=\"c\" hint-placeholder-count=\"12\"><option value=\"{{ c }}\">{{ c }}<\u002Foption><\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:13px;font-weight:600;color:#3a3d42;margin-bottom:6px\">Ce que vous recherchez<\u002Flabel>\n            <input name=\"title\" value=\"{{ draftReq.title }}\" onchange=\"{{ onReqChange }}\" placeholder=\"ex. iPhone 14 · 128 Go, ou Montage meuble IKEA\" style=\"width:100%;padding:12px 14px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:15px;background:#fff\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:13px;font-weight:600;color:#3a3d42;margin-bottom:6px\">Description (optionnel)<\u002Flabel>\n            <textarea name=\"desc\" value=\"{{ draftReq.desc }}\" onchange=\"{{ onReqChange }}\" rows=\"3\" placeholder=\"Précisez couleur, capacité, accessoires, contraintes…\" style=\"width:100%;padding:12px 14px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:15px;background:#fff;resize:vertical\"><\u002Ftextarea>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n            <div>\n              <label style=\"display:block;font-size:13px;font-weight:600;color:#3a3d42;margin-bottom:6px\">Budget maximum (€)<\u002Flabel>\n              <input name=\"budget\" value=\"{{ draftReq.budget }}\" onchange=\"{{ onReqChange }}\" type=\"number\" placeholder=\"450\" style=\"width:100%;padding:12px 14px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:15px;background:#fff\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:13px;font-weight:600;color:#3a3d42;margin-bottom:6px\">Délai souhaité<\u002Flabel>\n              <select name=\"delay\" value=\"{{ draftReq.delay }}\" onchange=\"{{ onReqChange }}\" style=\"width:100%;padding:12px 14px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:15px;background:#fff\">\n                <sc-for list=\"{{ delays }}\" as=\"d\" hint-placeholder-count=\"4\"><option value=\"{{ d }}\">{{ d }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n            <div>\n              <label style=\"display:block;font-size:13px;font-weight:600;color:#3a3d42;margin-bottom:6px\">État souhaité<\u002Flabel>\n              <select name=\"condition\" value=\"{{ draftReq.condition }}\" onchange=\"{{ onReqChange }}\" style=\"width:100%;padding:12px 14px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:15px;background:#fff\">\n                <sc-for list=\"{{ conditions }}\" as=\"c\" hint-placeholder-count=\"5\"><option value=\"{{ c }}\">{{ c }}<\u002Foption><\u002Fsc-for>\n              <\u002Fselect>\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:13px;font-weight:600;color:#3a3d42;margin-bottom:6px\">Ville<\u002Flabel>\n              <input name=\"city\" value=\"{{ draftReq.city }}\" onchange=\"{{ onReqChange }}\" placeholder=\"Lyon\" style=\"width:100%;padding:12px 14px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:15px;background:#fff\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ reqError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:14px;color:#c2461f;font-weight:600\">{{ reqErrorMsg }}<\u002Fdiv><\u002Fsc-if>\n          <button onclick=\"{{ publishRequest }}\" style=\"background:#EC5B34;color:#fff;border:none;border-radius:11px;padding:15px;font-weight:600;font-size:16px;cursor:pointer;margin-top:4px\">Publier ma demande<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isBuyerDetail }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <button onclick=\"{{ goBuyerHome }}\" style=\"background:none;border:none;color:#6b6f76;font-weight:600;font-size:14px;cursor:pointer;padding:0;margin-bottom:18px\">← Mes demandes<\u002Fbutton>\n        <div style=\"background:#0F1B2D;color:#fff;border-radius:18px;padding:24px 26px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap\">\n          <div>\n            <div style=\"font-size:12px;letter-spacing:0.05em;text-transform:uppercase;color:#8ea0b8;font-weight:600;margin-bottom:8px\">{{ curReq.category }}<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:24px;margin-bottom:6px\">{{ curReq.title }}<\u002Fdiv>\n            <div style=\"font-size:14px;color:#b7c3d4\">Budget max {{ curReq.budgetLabel }} · {{ curReq.condition }} · {{ curReq.delay }} · {{ curReq.city }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-size:12px;font-weight:700;color:#fff;background:rgba(236,91,52,0.9);padding:5px 12px;border-radius:8px;text-transform:uppercase;letter-spacing:0.03em\">{{ curReq.statusLabel }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasTxn }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#fff;border:1.5px solid #2E9E6B;border-radius:18px;padding:28px;margin-bottom:24px\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px\"><span style=\"width:26px;height:26px;border-radius:50%;background:#2E9E6B;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700\">✓<\u002Fspan><span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px\">{{ txnTitle }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:0;margin-bottom:22px\">\n              <sc-for list=\"{{ txnSteps }}\" as=\"st\" hint-placeholder-count=\"3\">\n                <div style=\"flex:1;text-align:center;position:relative\">\n                  <div style=\"width:14px;height:14px;border-radius:50%;background:{{ st.color }};margin:0 auto 8px\"><\u002Fdiv>\n                  <div style=\"font-size:12px;font-weight:600;color:{{ st.textColor }}\">{{ st.label }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"background:#F5F2EC;border-radius:12px;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px\">\n              <div><div style=\"font-size:13px;color:#6b6f76\">Payé à {{ txnSeller }}<\u002Fdiv><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px\">{{ txnAmount }}<\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:13px;color:#6b6f76;text-align:right\">Fonds bloqués<br>en séquestre<\u002Fdiv>\n            <\u002Fdiv>\n            <sc-if value=\"{{ canConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ confirmReception }}\" style=\"width:100%;background:#2E9E6B;color:#fff;border:none;border-radius:11px;padding:14px;font-weight:600;font-size:15px;cursor:pointer\">J'ai bien reçu — libérer les fonds<\u002Fbutton>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ canRate }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border-top:1px solid rgba(18,20,23,0.1);padding-top:18px\">\n                <div style=\"font-weight:600;font-size:15px;margin-bottom:10px\">Notez {{ txnSeller }}<\u002Fdiv>\n                <div style=\"display:flex;gap:6px;margin-bottom:12px\">\n                  <sc-for list=\"{{ stars }}\" as=\"s\" hint-placeholder-count=\"5\"><span onclick=\"{{ s.onClick }}\" style=\"font-size:30px;line-height:1;cursor:pointer;color:{{ s.color }}\">★<\u002Fspan><\u002Fsc-for>\n                <\u002Fdiv>\n                <textarea value=\"{{ ratingComment }}\" onchange=\"{{ onRatingComment }}\" rows=\"2\" placeholder=\"Un mot sur la transaction (optionnel)\" style=\"width:100%;padding:11px 13px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:14px;margin-bottom:12px;resize:vertical\"><\u002Ftextarea>\n                <button onclick=\"{{ submitRating }}\" style=\"background:#121417;color:#fff;border:none;border-radius:10px;padding:12px 22px;font-weight:600;font-size:14px;cursor:pointer\">Envoyer mon avis<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ isRated }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"text-align:center;color:#2E9E6B;font-weight:600;font-size:15px\">Merci pour votre avis ! Transaction terminée.<\u002Fdiv><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:grid;grid-template-columns:1.35fr 1fr;gap:22px;align-items:start\">\n          <div>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin-bottom:14px\">Offres reçues <span style=\"color:#6b6f76;font-weight:500\">({{ offerCount }})<\u002Fspan><\u002Fdiv>\n            <sc-if value=\"{{ waitingOffers }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#fff;border:1px dashed rgba(18,20,23,0.2);border-radius:14px;padding:36px 20px;text-align:center\">\n                <div style=\"display:inline-flex;align-items:center;gap:9px;font-weight:600;color:#6b6f76;font-size:15px\"><span style=\"width:9px;height:9px;border-radius:50%;background:#EC5B34;animation:vd-pulse 1.4s ease-in-out infinite\"><\u002Fspan>En attente d'offres…<\u002Fdiv>\n                <p style=\"font-size:14px;color:#9a9ea5;margin:10px 0 0\">Les vendeurs de la catégorie sont notifiés de votre demande.<\u002Fp>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex;flex-direction:column;gap:12px\">\n              <sc-for list=\"{{ curOffers }}\" as=\"o\" hint-placeholder-count=\"0\">\n                <div style=\"border:1.5px solid {{ o.border }};background:{{ o.bg }};border-radius:14px;padding:16px 18px\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:14px\">\n                    <div>\n                      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap\">\n                        <span style=\"font-weight:600;font-size:16px\">{{ o.seller }}<\u002Fspan>\n                        <sc-if value=\"{{ o.verified }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:11px;font-weight:600;color:#2E9E6B;background:rgba(46,158,107,0.12);padding:2px 7px;border-radius:6px\">✓ vérifié<\u002Fspan><\u002Fsc-if>\n                        <span style=\"font-size:13px;color:#8b8f96\">★ {{ o.rating }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"font-size:13px;color:#6b6f76\">{{ o.condition }} · {{ o.delay }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"text-align:right;flex-shrink:0\">\n                      <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.02em\">{{ o.priceLabel }}<\u002Fdiv>\n                      <sc-if value=\"{{ o.isBest }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11px;font-weight:700;color:#EC5B34;text-transform:uppercase;letter-spacing:0.03em\">Meilleur prix<\u002Fdiv><\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <sc-if value=\"{{ o.canAct }}\" hint-placeholder-val=\"{{ true }}\">\n                    <div style=\"display:flex;gap:8px;margin-top:14px\">\n                      <button onclick=\"{{ o.onMessage }}\" style=\"flex:1;background:transparent;border:1.5px solid rgba(18,20,23,0.16);border-radius:9px;padding:9px;font-weight:600;font-size:14px;cursor:pointer;color:#121417\">Message<\u002Fbutton>\n                      <button onclick=\"{{ o.onChoose }}\" style=\"flex:1;background:#EC5B34;color:#fff;border:none;border-radius:9px;padding:9px;font-weight:600;font-size:14px;cursor:pointer\">Choisir<\u002Fbutton>\n                    <\u002Fdiv>\n                  <\u002Fsc-if>\n                  <sc-if value=\"{{ o.chosen }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"margin-top:12px;font-size:13px;font-weight:700;color:#2E9E6B\">✓ Offre retenue<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:16px;padding:18px;position:sticky;top:84px\">\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:16px;margin-bottom:6px\">Messagerie<\u002Fdiv>\n            <sc-if value=\"{{ noThread }}\" hint-placeholder-val=\"{{ true }}\">\n              <p style=\"font-size:13px;color:#9a9ea5;margin:0;padding:20px 0;text-align:center\">Cliquez « Message » sur une offre pour discuter avec le vendeur.<\u002Fp>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ hasThread }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:12px;color:#6b6f76;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(18,20,23,0.08)\">Avec {{ threadWith }}<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px;max-height:280px;overflow-y:auto;margin-bottom:12px\">\n                <sc-for list=\"{{ thread }}\" as=\"m\" hint-placeholder-count=\"0\">\n                  <div style=\"align-self:{{ m.align }};max-width:82%;background:{{ m.bg }};color:{{ m.color }};padding:8px 12px;border-radius:12px;font-size:14px;line-height:1.4\">{{ m.text }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px\">\n                <input value=\"{{ chatInput }}\" onchange=\"{{ onChatChange }}\" placeholder=\"Votre message…\" style=\"flex:1;padding:10px 12px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:14px\">\n                <button onclick=\"{{ sendBuyerMsg }}\" style=\"background:#EC5B34;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:600;font-size:14px;cursor:pointer\">→<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isPay }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:520px;margin:0 auto\">\n        <button onclick=\"{{ backToDetail }}\" style=\"background:none;border:none;color:#6b6f76;font-weight:600;font-size:14px;cursor:pointer;padding:0;margin-bottom:18px\">← Retour aux offres<\u002Fbutton>\n        <h1 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:30px;letter-spacing:-0.02em;margin:0 0 6px\">Paiement sécurisé<\u002Fh1>\n        <p style=\"font-size:15px;color:#6b6f76;margin:0 0 24px\">Votre argent est bloqué en séquestre et n'est versé au vendeur qu'après votre confirmation de réception.<\u002Fp>\n        <div style=\"background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:18px;padding:26px\">\n          <div style=\"display:flex;justify-content:space-between;font-size:15px;margin-bottom:10px\"><span style=\"color:#6b6f76\">Offre de<\u002Fspan><span style=\"font-weight:600\">{{ payСeller }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;font-size:15px;margin-bottom:10px\"><span style=\"color:#6b6f76\">Article<\u002Fspan><span style=\"font-weight:600\">{{ payTitle }}<\u002Fspan><\u002Fdiv>\n          <d px;font-size:15px\">\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <div>\n              <label style=\"display:block;font-size:13px;font-weight:600;color:#3a3d42;margin-bottom:6px\">Email<\u002Flabel>\n              <input name=\"email\" value=\"{{ authDraft.email }}\" onchange=\"{{ onAuthChange }}\" type=\"email\" placeholder=\"vous@email.com\" style=\"width:100%;padding:12px 14px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:15px\">\n            <\u002Fdiv>\n            <div>\n              <label style=\"display:block;font-size:13px;font-weight:600;color:#3a3d42;margin-bottom:6px\">Mot de passe<\u002Flabel>\n              <input name=\"password\" value=\"{{ authDraft.password }}\" onchange=\"{{ onAuthChange }}\" type=\"password\" placeholder=\"••••••••\" style=\"width:100%;padding:12px 14px;border:1px solid rgba(18,20,23,0.16);border-radius:10px;font-size:15px\">\n            <\u002Fdiv>\n            <sc-if value=\"{{ authError }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:14px;color:#c2461f;font-weight:600\">{{ authErrorMsg }}<\u002Fdiv><\u002Fsc-if>\n            <sc-if value=\"{{ authIsLogin }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ doLogin }}\" style=\"background:#EC5B34;color:#fff;border:none;border-radius:11px;padding:14px;font-weight:600;font-size:16px;cursor:pointer\">Se connecter<\u002Fbutton><\u002Fsc-if>\n            <sc-if value=\"{{ authIsSignup }}\" hint-placeholder-val=\"{{ false }}\"><button onclick=\"{{ doSignup }}\" style=\"background:#EC5B34;color:#fff;border:none;border-radius:11px;padding:14px;font-weight:600;font-size:16px;cursor:pointer\">Créer mon compte<\u002Fbutton><\u002Fsc-if>\n          <\u002Fdiv>\n          <div style=\"text-align:center;font-size:12px;color:#9a9ea5;margin-top:14px\">Comptes réels via Supabase · connexion sécurisée<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isProfile }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"max-width:560px;margin:0 auto\">\n        <button onclick=\"{{ goBuyerHome }}\" style=\"background:none;border:none;color:#6b6f76;font-weight:600;font-size:14px;cursor:pointer;padding:0;margin-bottom:18px\">← Retour<\u002Fbutton>\n        <div style=\"background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:18px;padding:28px;display:flex;align-items:center;gap:18px;margin-bottom:18px\">\n          <span style=\"width:64px;height:64px;border-radius:50%;background:#0F1B2D;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px\">{{ profile.initials }}<\u002Fspan>\n          <div>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:22px;letter-spacing:-0.01em\">{{ profile.name }}<\u002Fdiv>\n            <div style=\"font-size:14px;color:#6b6f76\">{{ profile.email }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#9a9ea5;margin-top:2px\">Membre depuis {{ profile.since }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px\">\n          <div style=\"background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:14px;padding:20px;text-align:center\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;color:#EC5B34\">{{ profNbReq }}<\u002Fdiv><div style=\"font-size:13px;color:#6b6f76;font-weight:600\">demandes<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:14px;padding:20px;text-align:center\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;color:#EC5B34\">{{ profNbOffers }}<\u002Fdiv><div style=\"font-size:13px;color:#6b6f76;font-weight:600\">offres<\u002Fdiv><\u002Fdiv>\n          <div style=\"background:#fff;border:1px solid rgba(18,20,23,0.09);border-radius:14px;padding:20px;text-align:center\"><div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:28px;color:#EC5B34\">{{ profNbDeals }}<\u002Fdiv><div style=\"font-size:13px;color:#6b6f76;font-weight:600\">transactions<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ logout }}\" style=\"width:100%;background:transparent;border:1.5px solid rgba(18,20,23,0.18);border-radius:11px;padding:13px;font-weight:600;font-size:15px;color:#121417;cursor:pointer\">Se déconnecter<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#121417;color:#fff;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;z-index:60;box-shadow:0 14px 40px -12px rgba(0,0,0,0.5)\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900},&quot;afficherApercuApp&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Vitrine&quot;},&quot;offresTri&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Prix croissant&quot;,&quot;Meilleure note&quot;],&quot;default&quot;:&quot;Prix croissant&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Vitrine&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    page: 'site', servicesOpen: false, openFaq: 0,\n    currentUser: null, authTab: 'login', authDraft: { name: '', email: '', password: '' }, authError: false, pendingIntent: null,\n    role: 'buyer', view: 'home', sellerTab: 'open', currentReqId: null, chosenOfferId: null,\n    activeOfferThread: null,\n    draftReq: { category: '', title: '', desc: '', budget: '', delay: 'Sous 3 jours', condition: 'Très bon état', city: '' },\n    draftOffer: { price: '', condition: 'Très bon état', delay: 'Sous 2 jours', message: '' },\n    chatInput: '', draftRating: 0, ratingComment: '', reqError: false, offerError: false,\n    toast: null,\n    requests: this.seed(),\n    offers: [], messages: [], transactions: [], ratings: []\n  };\n\n  KEY = 'vendora_site_v1';\n  SELLERS = [\n    { name: 'TechRefurb', rating: '4,9', verified: true },\n    { name: 'MobiStore', rating: '4,7', verified: true },\n    { name: 'GreenGadget', rating: '4,6', verified: true },\n    { name: 'Atelier Pro', rating: '4,8', verified: true }\n  ];\n  CATS = ['Smartphones', 'Consoles & jeux vidéo', 'PC gaming', 'Tablettes', 'Électroménager', 'Véhicules', 'Ménage & petits travaux', 'Dépannage & travaux', 'Transport & déménagement', 'Cours & accompagnement', 'Services numériques', 'Services du quotidien'];\n  CONDITIONS = ['Neuf', 'Comme neuf', 'Très bon état', 'Bon état', 'Tout état'];\n  DELAYS = ['Aujourd’hui', 'Sous 3 jours', 'Cette semaine', 'Pas pressé'];\n  SDELAYS = ['Aujourd’hui', 'Sous 2 jours', 'Sous 3 jours', 'Cette semaine'];\n\n  uid(p) { return p + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-4); }\n\n  seed() {\n    const now = Date.now(), h = 3600000;\n    return [\n      { id: 'seed1', owner: 'bot', ownerName: 'Camille', category: 'Smartphones', title: 'iPhone 13 · 128 Go', condition: 'Très bon état', budget: 380, delay: 'Sous 3 jours', city: 'Lyon', desc: 'Idéalement noir ou bleu, avec chargeur.', createdAt: now - 2 * h },\n      { id: 'seed2', owner: 'bot', ownerName: 'Mehdi', category: 'Consoles & jeux vidéo', title: 'PS5 Slim + 2e manette', condition: 'Comme neuf', budget: 420, delay: 'Cette semaine', city: 'Lyon', desc: '', createdAt: now - 5 * h },\n      { id: 'seed3', owner: 'bot', ownerName: 'Julie', category: 'Dépannage & travaux', title: 'Fuite sous évier — plomberie', condition: 'Tout état', budget: 120, delay: 'Aujourd’hui', city: 'Villeurbanne', desc: 'Intervention rapide souhaitée, joint qui fuit.', createdAt: now - 40 * 60000 },\n      { id: 'seed4', owner: 'bot', ownerName: 'Thomas', category: 'PC gaming', title: 'PC portable RTX 4060', condition: 'Bon état', budget: 900, delay: 'Pas pressé', city: 'Lyon', desc: '16 Go RAM minimum.', createdAt: now - 26 * h },\n      { id: 'seed5', owner: 'bot', ownerName: 'Sofia', category: 'Ménage & petits travaux', title: 'Montage meuble IKEA (armoire)', condition: 'Tout état', budget: 70, delay: 'Cette semaine', city: 'Lyon', desc: '', createdAt: now - 8 * h }\n    ];\n  }\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(this.KEY);\n      if (raw) { const d = JSON.parse(raw); this.setState(d); }\n    } catch (e) {}\n    const h = (location.hash || '').replace(/^#/, '');\n    if (h === 'vendeur') this.setState({ page: 'app', role: 'seller', view: 'home', sellerTab: 'open' });\n    else if (h === 'demande') this.setState({ page: 'app', role: 'buyer', view: 'new', reqError: false });\n    else if (h.indexOf('cat=') === 0) { const c = decodeURIComponent(h.slice(4)); this.setState(s => ({ page: 'app', role: 'buyer', view: 'new', reqError: false, draftReq: { ...s.draftReq, category: this.CATS.indexOf(c) >= 0 ? c : '' } })); }\n    this._loaded = true;\n    this.initSupabase(0);\n  }\n  initSupabase(tries) {\n    try {\n      if (window.supabase && window.supabase.createClient) {\n        this.sb = window.supabase.createClient('https://spduepwajtgukmktchzw.supabase.co', 'sb_publishable_RPkvdZ-mv9Jr-pWXJg6pWw_0bDq3kJC');\n        this.sb.auth.getSession().then(({ data }) => { if (data && data.session) this.setUserFromSession(data.session.user); });\n        this.sb.auth.onAuthStateChange((_e, session) => { if (session && session.user) this.setUserFromSession(session.user); });\n        return;\n      }\n    } catch (e) { return; }\n    if ((tries || 0) < 40) setTimeout(() => this.initSupabase((tries || 0) + 1), 150);\n  }\n  setUserFromSession(u) {\n    const name = (u.user_metadata && u.user_metadata.name) || (u.email ? u.email.split('@')[0] : 'Utilisateur');\n    this.setState({ currentUser: { id: u.id, name, email: u.email, memberSince: u.created_at ? Date.parse(u.created_at) : Date.now() } }, () => this.loadRequests());\n  }\n  async loadRequests() {\n    if (!this.sb || !this.state.currentUser) return;\n    try {\n      const { data, error } = await this.sb.from('requests').select('*').order('created_at', { ascending: false });\n      if (error || !data) return;\n      const uid = this.state.currentUser.id;\n      const reqs = data.map(r => ({ id: r.id, owner: r.owner_id === uid ? 'me' : 'other', ownerName: r.owner_name || 'Utilisateur', category: r.category, title: r.title, desc: r.description || '', budget: r.budget || 0, delay: r.delay || '', condition: r.condition || '', city: r.city || '', status: r.status || 'ouverte', createdAt: r.created_at ? Date.parse(r.created_at) : Date.now() }));\n      this.setState({ requests: reqs });\n    } catch (e) {}\n  }\n  componentDidUpdate() { if (this._loaded) this.persist(); }\n  persist() {\n    try {\n      const { page, role, view, sellerTab, currentReqId, requests, offers, messages, transactions, ratings } = this.state;\n      localStorage.setItem(this.KEY, JSON.stringify({ page, role, view, sellerTab, currentReqId, requests, offers, messages, transactions, ratings }));\n    } catch (e) {}\n  }\n  resetDemo() {\n    try { localStorage.removeItem(this.KEY); } catch (e) {}\n    this.setState({ role: 'buyer', view: 'home', sellerTab: 'open', currentReqId: null, chosenOfferId: null, activeOfferThread: null, requests: this.seed(), offers: [], messages: [], transactions: [], ratings: [], toast: 'Démo réinitialisée' });\n    clearTimeout(this._tt); this._tt = setTimeout(() => this.setState({ toast: null }), 2400);\n  }\n  toast(msg) { this.setState({ toast: msg }); clearTimeout(this._tt); this._tt = setTimeout(() => this.setState({ toast: null }), 2600); }\n\n  euro(n) { return Math.round(n).toLocaleString('fr-FR') + ' €'; }\n  ago(ts) { const m = Math.floor((Date.now() - ts) / 60000); if (m < 1) return \"à l'instant\"; if (m < 60) return 'il y a ' + m + ' min'; const h = Math.floor(m / 60); if (h < 24) return 'il y a ' + h + ' h'; return 'il y a ' + Math.floor(h / 24) + ' j'; }\n\n  // ---- page routing (vitrine <-> app) ----\n  enterDemande() { if (this.state.currentUser) this.setState({ page: 'app', role: 'buyer', view: 'new', reqError: false }); else this.setState({ page: 'app', view: 'auth', authTab: 'signup', pendingIntent: 'new' }); }\n  enterVendeur() { if (this.state.currentUser) this.setState({ page: 'app', role: 'seller', view: 'home', sellerTab: 'open' }); else this.setState({ page: 'app', view: 'auth', authTab: 'signup', pendingIntent: 'vendeur' }); }\n  enterBuyer() { if (this.state.currentUser) this.setState({ page: 'app', role: 'buyer', view: 'home' }); else this.setState({ page: 'app', view: 'auth', authTab: 'login', pendingIntent: 'buyer' }); }\n  backToSite() { this.setState({ page: 'site' }); }\n  toggleServices() { this.setState(s => ({ servicesOpen: !s.servicesOpen })); }\n  onAuthChange(e) { const { name, value } = e.target; this.setState(s => ({ authDraft: { ...s.authDraft, [name]: value } })); }\n  setAuthTab(t) { this.setState({ authTab: t, authError: false }); }\n  _afterAuth(u) {\n    const intent = this.state.pendingIntent;\n    const ns = { currentUser: u, authDraft: { name: '', email: '', password: '' }, authError: false, pendingIntent: null };\n    if (intent === 'vendeur') { ns.role = 'seller'; ns.view = 'home'; ns.sellerTab = 'open'; }\n    else if (intent === 'new') { ns.role = 'buyer'; ns.view = 'new'; }\n    else { ns.role = 'buyer'; ns.view = 'home'; }\n    this.setState(ns);\n    this.toast('Bienvenue, ' + u.name + ' !');\n  }\n  async doSignup() {\n    const d = this.state.authDraft;\n    if (!d.name.trim() || !d.email.trim() || !d.password) { this.setState({ authError: true, authErrorMsg: 'Merci de remplir tous les champs.' }); return; }\n    if (this.sb) {\n      const { data, error } = await this.sb.auth.signUp({ email: d.email.trim(), password: d.password, options: { data: { name: d.name.trim() } } });\n      if (error) { this.setState({ authError: true, authErrorMsg: error.message }); return; }\n      if (!data.session) { this.setState({ authTab: 'login', authError: false, authDraft: { name: '', email: d.email.trim(), password: '' } }); this.toast('Compte créé — confirmez votre email puis connectez-vous.'); return; }\n      this._afterAuth({ name: d.name.trim(), email: d.email.trim(), memberSince: Date.now() });\n    } else { this._afterAuth({ name: d.name.trim(), email: d.email.trim(), memberSince: Date.now() }); }\n  }\n  async doLogin() {\n    const d = this.state.authDraft;\n    if (!d.email.trim() || !d.password) { this.setState({ authError: true, authErrorMsg: 'Merci de remplir tous les champs.' }); return; }\n    if (this.sb) {\n      const { data, error } = await this.sb.auth.signInWithPassword({ email: d.email.trim(), password: d.password });\n      if (error) { this.setState({ authError: true, authErrorMsg: 'Email ou mot de passe incorrect.' }); return; }\n      const u = data.user;\n      this._afterAuth({ name: (u.user_metadata && u.user_metadata.name) || d.email.split('@')[0], email: d.email.trim(), memberSince: u.created_at ? Date.parse(u.created_at) : Date.now() });\n    } else { this._afterAuth({ name: (d.name.trim() || d.email.split('@')[0]), email: d.email.trim(), memberSince: Date.now() }); }\n  }\n  async logout() { if (this.sb) { try { await this.sb.auth.signOut(); } catch (e) {} } this.setState({ currentUser: null, page: 'site', view: 'home', role: 'buyer' }); this.toast('Déconnecté'); }\n  goProfile() { this.setState({ view: 'profile' }); }\n\n  // ---- app navigation ----\n  goBuyer() { this.setState({ role: 'buyer', view: 'home' }); }\n  goSeller() { this.setState({ role: 'seller', view: 'home', sellerTab: 'open' }); }\n  goBuyerHome() { this.setState({ view: 'home' }); }\n  goSellerHome() { this.setState({ view: 'home' }); }\n  goNew() { if (!this.state.currentUser) { this.setState({ view: 'auth', authTab: 'signup', pendingIntent: 'new' }); return; } this.setState({ view: 'new', reqError: false }); }\n\n  onReqChange(e) { const { name, value } = e.target; this.setState(s => ({ draftReq: { ...s.draftReq, [name]: value } })); }\n  async publishRequest() {\n    if (!this.state.currentUser) { this.setState({ view: 'auth', authTab: 'signup', pendingIntent: 'new' }); return; }\n    const d = this.state.draftReq;\n    if (!d.category || !d.title.trim() || !d.budget) { this.setState({ reqError: true, reqErrorMsg: 'Renseignez au moins la catégorie, l’objet et le budget.' }); return; }\n    const blank = { category: '', title: '', desc: '', budget: '', delay: 'Sous 3 jours', condition: 'Très bon état', city: '' };\n    if (this.sb) {\n      const u = this.state.currentUser;\n      const { data, error } = await this.sb.from('requests').insert({ owner_id: u.id, owner_name: u.name, category: d.category, title: d.title.trim(), description: d.desc.trim(), budget: Number(d.budget), condition: d.condition, delay: d.delay, city: d.city.trim() || 'Lyon', status: 'ouverte' }).select().single();\n      if (error || !data) { this.setState({ reqError: true, reqErrorMsg: 'Erreur d’enregistrement : ' + ((error && error.message) || 'inconnue') }); return; }\n      const id = data.id;\n      this.setState({ currentReqId: id, view: 'detail', activeOfferThread: null, reqError: false, draftReq: blank });\n      await this.loadRequests();\n      this.spawnOffer(id, Number(d.budget), 1500);\n      this.spawnOffer(id, Number(d.budget), 3400);\n    } else {\n      const id = this.uid('r');\n      const req = { id, owner: 'me', ownerName: (this.state.currentUser && this.state.currentUser.name) || 'Vous', category: d.category, title: d.title.trim(), desc: d.desc.trim(), budget: Number(d.budget), delay: d.delay, condition: d.condition, city: d.city.trim() || 'Lyon', createdAt: Date.now() };\n      this.setState(s => ({ requests: [req, ...s.requests], currentReqId: id, view: 'detail', activeOfferThread: null, reqError: false, draftReq: blank }));\n      this.spawnOffer(id, req.budget, 1500);\n      this.spawnOffer(id, req.budget, 3400);\n    }\n  }\n  spawnOffer(reqId, budget, ms) {\n    setTimeout(() => {\n      const used = this.state.offers.filter(o => o.reqId === reqId && o.bot).map(o => o.seller);\n      const pool = this.SELLERS.filter(s => !used.includes(s.name));\n      if (!pool.length) return;\n      const s = pool[Math.floor(Math.random() * pool.length)];\n      const price = Math.max(20, Math.round(budget * (0.82 + Math.random() * 0.14)));\n      const cond = this.CONDITIONS[1 + Math.floor(Math.random() * 3)];\n      const del = this.SDELAYS[Math.floor(Math.random() * this.SDELAYS.length)];\n      const o = { id: this.uid('o'), reqId, seller: s.name, rating: s.rating, verified: true, bot: true, price, condition: cond, delay: del, status: 'en attente', message: 'Bonjour ! Voici mon offre, produit disponible immédiatement.' };\n      this.setState(st => ({ offers: [...st.offers, o] }));\n      if (this.state.role === 'buyer') this.toast('Nouvelle offre reçue');\n    }, ms);\n  }\n\n  openMsg(offerId, seller) {\n    this.setState(s => {\n      const has = s.messages.some(m => m.offerId === offerId);\n      const msgs = has ? s.messages : [...s.messages, { id: this.uid('m'), offerId, sender: 'seller', text: 'Bonjour ! Je reste dispo pour toute question sur cette offre.', ts: Date.now() }];\n      return { activeOfferThread: offerId, messages: msgs };\n    });\n  }\n  onChatChange(e) { this.setState({ chatInput: e.target.value }); }\n  sendBuyerMsg() {\n    const t = this.state.chatInput.trim(); const oid = this.state.activeOfferThread; if (!t || !oid) return;\n    this.setState(s => ({ messages: [...s.messages, { id: this.uid('m'), offerId: oid, sender: 'buyer'    ...o, priceLabel: this.euro(o.price), seller: o.seller === 'me' ? 'Vous (vendeur)' : o.seller,\n          isBest: o.price === min && !txn, border: (txn && txn.offerId === o.id) ? '#2E9E6B' : (o.price === min ? '#EC5B34' : 'rgba(18,20,23,0.1)'),\n          bg: (txn && txn.offerId === o.id) ? 'rgba(46,158,107,0.06)' : (o.price === min && !txn ? 'rgba(236,91,52,0.05)' : '#fff'),\n          canAct: !txn, chosen: txn && txn.offerId === o.id,\n          onMessage: () => this.openMsg(o.id, o.seller), onChoose: () => this.chooseOffer(o.id)\n        }));\n        out.offerCount = offs.length; out.waitingOffers = offs.length === 0 && !txn;\n        const oid = S.activeOfferThread;\n        out.hasThread = !!oid; out.noThread = !oid;\n        if (oid) {\n          const ao = S.offers.find(o => o.id === oid);\n          out.threadWith = ao ? (ao.seller === 'me' ? 'Vous (vendeur)' : ao.seller) : '';\n          out.thread = S.messages.filter(m => m.offerId === oid).sort((a, b) => a.ts - b.ts).map(m => ({\n            text: m.text, align: m.sender === 'buyer' ? 'flex-end' : 'flex-start',\n            bg: m.sender === 'buyer' ? '#EC5B34' : '#F0EDE6', color: m.sender === 'buyer' ? '#fff' : '#121417'\n          }));\n        } else { out.thread = []; }\n        out.hasTxn = !!txn;\n        if (txn) {\n          const released = txn.status === 'libéré';\n          const rated = S.ratings.some(x => x.txnId === txn.id && x.by === 'buyer');\n          out.txnSeller = txn.seller === 'me' ? 'vous (vendeur)' : txn.seller;\n          out.txnAmount = this.euro(txn.amount);\n          out.txnTitle = rated ? 'Transaction terminée' : (released ? 'Réception confirmée' : 'Paiement en séquestre');\n          out.canConfirm = !released; out.canRate = released && !rated; out.isRated = rated;\n          const c1 = '#2E9E6B', c0 = 'rgba(18,20,23,0.15)';\n          out.txnSteps = [\n            { label: 'Payé', color: c1, textColor: '#121417' },\n            { label: 'Livraison', color: released ? c1 : c0, textColor: released ? '#121417' : '#9a9ea5' },\n            { label: 'Reçu', color: released ? c1 : c0, textColor: released ? '#121417' : '#9a9ea5' }\n          ];\n        }\n        out.stars = [1, 2, 3, 4, 5].map(n => ({ onClick: () => this.starClick(n), color: n <= S.draftRating ? '#EC5B34' : 'rgba(18,20,23,0.18)' }));\n        const co = S.offers.find(o => o.id === S.chosenOfferId);\n        if (co) { out.payСeller = co.seller === 'me' ? 'Vous (vendeur)' : co.seller; out.payTitle = r.title; out.payPrice = this.euro(co.price); }\n      }\n    }\n\n    // ---------- APP: seller home ----------\n    if (role === 'seller') {\n      const openR = S.requests.filter(r => { const t = S.transactions.find(x => x.reqId === r.id); return !(t && t.status); });\n      out.openReqs = openR.map(r => ({ ...r, budgetLabel: this.euro(r.budget), age: this.ago(r.createdAt), mine: S.offers.some(o => o.reqId === r.id && o.seller === 'me'), onOpen: () => this.openSellerReq(r.id) }));\n      const myO = S.offers.filter(o => o.seller === 'me');\n      out.noMyOffers = myO.length === 0;\n      out.myOffers = myO.map(o => {\n        const req = S.requests.find(r => r.id === o.reqId) || {};\n        const txn = S.transactions.find(t => t.offerId === o.id);\n        const accepted = o.status === 'acceptée';\n        const released = txn && txn.status === 'libéré';\n        const rated = txn && S.ratings.some(x => x.txnId === txn.id && x.by === 'seller');\n        const sm = accepted ? { label: 'Acceptée', color: '#1f7a52', bg: 'rgba(46,158,107,0.14)' } : (o.status === 'refusée' ? { label: 'Non retenue', color: '#9a9ea5', bg: 'rgba(18,20,23,0.05)' } : { label: 'En attente', color: '#6b6f76', bg: 'rgba(18,20,23,0.06)' });\n        return {\n          reqTitle: req.title, reqCategory: req.category, priceLabel: this.euro(o.price), condition: o.condition,\n          statusLabel: sm.label, statusColor: sm.color, statusBg: sm.bg, accepted,\n          canShip: accepted && txn && txn.status === 'sequestre',\n          canRate: released && !rated, done: rated,\n          onShip: () => this.shipOffer(o.id), onRate: () => this.rateBuyer(o.id)\n        };\n      });\n    }\n\n    // ---------- APP: seller detail ----------\n    if (role === 'seller' && view === 'detail') {\n      const r = S.requests.find(x => x.id === S.currentReqId);\n      if (r) {\n        out.sReq = { ...r, budgetLabel: this.euro(r.budget) }; out.sReqHasDesc = !!r.desc;\n        const my = S.offers.find(o => o.reqId === r.id && o.seller === 'me');\n        out.sellerNoOffer = !my; out.sellerHasOffer = !!my;\n        if (my) {\n          const accepted = my.status === 'acceptée';\n          const sm = accepted ? { l: 'Acceptée', c: '#1f7a52', b: 'rgba(46,158,107,0.14)', bd: '#2E9E6B' } : { l: 'En attente', c: '#6b6f76', b: 'rgba(18,20,23,0.06)', bd: 'rgba(18,20,23,0.12)' };\n          out.myOfferPrice = this.euro(my.price); out.myOfferCondition = my.condition; out.myOfferDelay = my.delay;\n          out.myOfferStatusLabel = sm.l; out.myOfferStatusColor = sm.c; out.myOfferStatusBg = sm.b; out.myOfferBorder = sm.bd;\n          out.sellerThread = S.messages.filter(m => m.offerId === my.id).sort((a, b) => a.ts - b.ts).map(m => ({\n            text: m.text, align: m.sender === 'seller' ? 'flex-end' : 'flex-start',\n            bg: m.sender === 'seller' ? '#EC5B34' : '#F0EDE6', color: m.sender === 'seller' ? '#fff' : '#121417'\n          }));\n        }\n      }\n    }\n\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
